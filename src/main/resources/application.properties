server.port=${SERVER_PORT:8091}
spring.application.name=ccavenue-student-fees

# =====================================================================
# CCAvenue configuration
# These TEST credentials are the same ones used by the hdma-backend .env
# (KOTAK_* keys). Override every value via environment variables in prod.
# =====================================================================
ccavenue.merchant-id=${CCAVENUE_MERCHANT_ID:your_merchant_id}
ccavenue.access-code=${CCAVENUE_ACCESS_CODE:your_access_code}
ccavenue.working-key=${CCAVENUE_WORKING_KEY:your_working_key}

# UAT / test gateway. (Production gateway is https://secure.ccavenue.com/transaction/transaction.do?command=initiateTransaction)
ccavenue.transaction-url=${CCAVENUE_TRANSACTION_URL:https://test.ccavenue.com/transaction/transaction.do?command=initiateTransaction}

# CCAvenue posts the result back here. Must be a publicly reachable URL in real use.
# Deployment host: https://springboot.alliantprojects.com
ccavenue.redirect-url=${CCAVENUE_REDIRECT_URL:https://springboot.alliantprojects.com/payment/response}
ccavenue.cancel-url=${CCAVENUE_CANCEL_URL:https://springboot.alliantprojects.com/payment/response}

# =====================================================================
# MySQL datasource
# =====================================================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/student_fees?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:studentfees}
spring.datasource.password=${DB_PASSWORD:your_db_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

logging.level.com.example.studentfees=INFO
