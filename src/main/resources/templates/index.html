<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Student Fees Payment</title>
    <style>
        :root { --primary:#1d4ed8; --bg:#f1f5f9; --card:#ffffff; --err:#dc2626; }
        * { box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
               background: var(--bg); margin: 0; padding: 2rem; color:#0f172a; }
        .card { max-width: 560px; margin: 0 auto; background: var(--card);
                border-radius: 16px; padding: 2rem 2.25rem; box-shadow: 0 10px 30px rgba(0,0,0,.08); }
        h1 { margin: 0 0 .25rem; font-size: 1.5rem; }
        .sub { color:#64748b; margin: 0 0 1.5rem; font-size:.92rem; }
        label { display:block; font-weight:600; font-size:.85rem; margin:.9rem 0 .35rem; }
        input, select { width:100%; padding:.65rem .75rem; border:1px solid #cbd5e1;
                border-radius:9px; font-size:.95rem; }
        input:focus, select:focus { outline:none; border-color:var(--primary);
                box-shadow:0 0 0 3px rgba(29,78,216,.15); }
        .row { display:flex; gap:1rem; }
        .row > div { flex:1; }
        .err { color:var(--err); font-size:.78rem; margin-top:.25rem; }
        button { margin-top:1.5rem; width:100%; background:var(--primary); color:#fff;
                border:none; padding:.85rem; font-size:1rem; font-weight:600;
                border-radius:10px; cursor:pointer; }
        button:hover { background:#1742b8; }
        .badge { display:inline-block; background:#dbeafe; color:#1d4ed8; font-size:.72rem;
                font-weight:700; padding:.2rem .55rem; border-radius:999px; margin-bottom:1rem; }
    </style>
</head>
<body>
<div class="card">
    <span class="badge">CCAvenue Demo</span>
    <h1>Student Fees Payment</h1>
    <p class="sub">Enter the student details and pay securely via CCAvenue.
        &middot; <a th:href="@{/payments}">View all payments &rarr;</a></p>

    <form th:action="@{/pay}" th:object="${feeForm}" method="post">
        <label for="studentName">Student Name</label>
        <input type="text" id="studentName" th:field="*{studentName}" placeholder="e.g. Aisha Khan"/>
        <div class="err" th:if="${#fields.hasErrors('studentName')}" th:errors="*{studentName}"></div>

        <div class="row">
            <div>
                <label for="rollNumber">Roll Number</label>
                <input type="text" id="rollNumber" th:field="*{rollNumber}" placeholder="e.g. CS21B045"/>
                <div class="err" th:if="${#fields.hasErrors('rollNumber')}" th:errors="*{rollNumber}"></div>
            </div>
            <div>
                <label for="course">Course</label>
                <input type="text" id="course" th:field="*{course}" placeholder="e.g. B.Tech CSE"/>
                <div class="err" th:if="${#fields.hasErrors('course')}" th:errors="*{course}"></div>
            </div>
        </div>

        <label for="feeType">Fee Type</label>
        <select id="feeType" th:field="*{feeType}">
            <option value="">-- Select --</option>
            <option value="Tuition Fee">Tuition Fee</option>
            <option value="Exam Fee">Exam Fee</option>
            <option value="Hostel Fee">Hostel Fee</option>
            <option value="Library Fee">Library Fee</option>
            <option value="Transport Fee">Transport Fee</option>
        </select>
        <div class="err" th:if="${#fields.hasErrors('feeType')}" th:errors="*{feeType}"></div>

        <div class="row">
            <div>
                <label for="email">Email</label>
                <input type="email" id="email" th:field="*{email}" placeholder="student@example.com"/>
                <div class="err" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>
            <div>
                <label for="mobile">Mobile</label>
                <input type="text" id="mobile" th:field="*{mobile}" placeholder="10-digit number"/>
                <div class="err" th:if="${#fields.hasErrors('mobile')}" th:errors="*{mobile}"></div>
            </div>
        </div>

        <label for="amount">Amount (INR)</label>
        <input type="number" step="0.01" id="amount" th:field="*{amount}" placeholder="e.g. 25000.00"/>
        <div class="err" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></div>

        <button type="submit">Pay Fees Securely &rarr;</button>
    </form>
</div>
</body>
</html>
