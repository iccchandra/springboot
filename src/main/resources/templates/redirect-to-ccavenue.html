<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Redirecting to CCAvenue…</title>
    <style>
        body { font-family: system-ui, sans-serif; background:#f1f5f9; text-align:center;
               padding-top:6rem; color:#0f172a; }
        .spinner { width:42px; height:42px; border:4px solid #cbd5e1; border-top-color:#1d4ed8;
               border-radius:50%; animation:spin 1s linear infinite; margin:1.5rem auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .muted { color:#64748b; font-size:.9rem; }
    </style>
</head>
<body>
    <h2>Redirecting to the secure CCAvenue payment page…</h2>
    <div class="spinner"></div>
    <p class="muted">
        Order <strong th:text="${orderId}">ORDER</strong> &middot;
        <span th:text="${studentName}">Student</span> &middot;
        ₹<span th:text="${amount}">0.00</span>
    </p>
    <p class="muted">Please do not refresh or close this window.</p>

    <!-- Auto-submitting form: posts the encrypted request to CCAvenue -->
    <form id="ccavenueForm" method="post" th:action="${transactionUrl}">
        <input type="hidden" name="encRequest" th:value="${encRequest}"/>
        <input type="hidden" name="access_code" th:value="${accessCode}"/>
    </form>

    <script>
        document.getElementById('ccavenueForm').submit();
    </script>
</body>
</html>
